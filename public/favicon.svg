<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#13131F"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado oscuro como en el logo adjunto -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Cuerpo del cronómetro -->
  <circle cx="32" cy="37" r="16" fill="none" stroke="#7B68EE" stroke-width="3"/>
  <!-- Botón superior -->
  <rect x="28" y="17" width="8" height="4" rx="2" fill="#7B68EE"/>
  <!-- Orejas laterales -->
  <line x1="24" y1="19" x2="20" y2="15" stroke="#7B68EE" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="19" x2="44" y2="15" stroke="#7B68EE" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Manecilla minutos -->
  <line x1="32" y1="37" x2="32" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Manecilla segundos -->
  <line x1="32" y1="37" x2="40" y2="37" stroke="#FF6BCA" stroke-width="2" stroke-linecap="round"/>
  <!-- Centro -->
  <circle cx="32" cy="37" r="2" fill="white"/>
</svg>